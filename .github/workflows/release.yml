name: Release Build

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g., v1.0.0)'
        required: false

env:
  VERSION: ${{ github.event.release.tag_name || github.event.inputs.tag || 'dev' }}
  SCHEME: FRCMacDS
  PROJECT: FRCMacDS/FRCMacDS.xcodeproj

jobs:
  build-macos:
    runs-on: macos-26
    outputs:
      dmg_name: ${{ steps.package.outputs.dmg_name }}
      dmg_size: ${{ steps.sparkle_sign.outputs.dmg_size }}
      sparkle_signature: ${{ steps.sparkle_sign.outputs.signature }}
    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: version
        run: |
          VERSION="${{ env.VERSION }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import Code Signing Certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME"

      - name: Build and Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$PWD/build/FRCMacDS.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.version }}"

      - name: Export Archive
        run: |
          mkdir -p build
          cat > build/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/FRCMacDS.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/export

      - name: Sign Sparkle Framework
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH=$(find build/export -name "*.app" -type d | head -1)
          SIGN_ID="Developer ID Application: Single Feather LLC ($APPLE_TEAM_ID)"

          SPARKLE_PATH="$APP_PATH/Contents/Frameworks/Sparkle.framework"
          if [ -d "$SPARKLE_PATH" ]; then
            # Sign Sparkle inside-out
            codesign -f -s "$SIGN_ID" -o runtime --timestamp \
              "$SPARKLE_PATH/Versions/B/XPCServices/Installer.xpc" 2>/dev/null || true
            codesign -f -s "$SIGN_ID" -o runtime --timestamp --preserve-metadata=entitlements \
              "$SPARKLE_PATH/Versions/B/XPCServices/Downloader.xpc" 2>/dev/null || true
            codesign -f -s "$SIGN_ID" -o runtime --timestamp \
              "$SPARKLE_PATH/Versions/B/Updater.app" 2>/dev/null || true
            codesign -f -s "$SIGN_ID" -o runtime --timestamp \
              "$SPARKLE_PATH/Versions/B/Autoupdate" 2>/dev/null || true
            codesign -f -s "$SIGN_ID" -o runtime --timestamp \
              "$SPARKLE_PATH"
          fi

          # Re-sign the main app after framework signing
          codesign -f -s "$SIGN_ID" -o runtime --timestamp "$APP_PATH"
          codesign -dv --verbose=2 "$APP_PATH"

      - name: Create DMG
        id: package
        run: |
          APP_PATH=$(find build/export -name "*.app" -type d | head -1)
          DMG_NAME="FRCMacDS-${{ steps.version.outputs.version }}-macOS.dmg"

          DMG_STAGING=$(mktemp -d)
          cp -a "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create \
            -volname "FRC Mac DS" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            "build/$DMG_NAME"

          rm -rf "$DMG_STAGING"
          echo "dmg_name=$DMG_NAME" >> $GITHUB_OUTPUT

      - name: Sign DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH=$(find build -name "*.dmg" -type f | head -1)
          codesign --force \
            --sign "Developer ID Application: Single Feather LLC ($APPLE_TEAM_ID)" \
            --timestamp \
            "$DMG_PATH"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH=$(find build -name "*.dmg" -type f | head -1)
          echo "Notarizing $DMG_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json | tee notarization_result.json

          SUBMISSION_ID=$(cat notarization_result.json | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null || true)
          if [ -n "$SUBMISSION_ID" ]; then
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
          fi

          xcrun stapler staple "$DMG_PATH"
          echo "Notarization complete!"

      - name: Sign for Sparkle
        id: sparkle_sign
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          DMG_PATH=$(find build -name "*.dmg" -type f | head -1)

          DMG_SIZE=$(stat -f%z "$DMG_PATH")
          echo "dmg_size=$DMG_SIZE" >> $GITHUB_OUTPUT

          # Download Sparkle tools
          SPARKLE_VERSION="2.6.4"
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" | tar -xJ

          SIGN_OUTPUT=$(echo -n "$SPARKLE_ED_PRIVATE_KEY" | ./bin/sign_update "$DMG_PATH" -f -)
          SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          echo "signature=$SIGNATURE" >> $GITHUB_OUTPUT

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: build/FRCMacDS-*-macOS.dmg

  upload-release:
    needs: [build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Get version
        id: version
        run: |
          VERSION="${{ env.VERSION }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/macos-dmg/*

      - name: Update Sparkle appcast
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          ./scripts/update-appcast.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ env.VERSION }}" \
            "${{ needs.build-macos.outputs.dmg_size }}" \
            "${{ needs.build-macos.outputs.sparkle_signature }}" \
            "$RELEASE_BODY" \
            "${{ github.repository }}"

      - name: Commit and push appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "Update appcast for ${{ env.VERSION }}" || exit 0
          git push
